services:
  georisk:
    image: python:3.12-slim
    container_name: georisk-api
    working_dir: /app
    command: bash -lc "pip install -r /app/backend/requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8090"
    volumes:
      - /root/GEO-RISK:/app
    environment:
      - OPENROUTER_API_KEY=__REMOVED__
      - OPENROUTER_MODEL=openrouter/auto
    ports:
      - "8090:8090"
    restart: unless-stopped
